url: https://swarm-lab.github.io/ROpenCVLite/

template:
  bootstrap: 5
  bootswatch: simplex

authors:
  Simon Garnier:
    href: https://www.theswarmlab.com

reference:
  - title: Package
    desc: Package documentation
    contents:
      - ROpenCVLite-package
